<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extension uninstalled</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, system-ui, sans-serif;
      background: linear-gradient(145deg, #16161f 0%, #1f1520 50%, #151820 100%);
      color: hsl(330 20% 94%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }
    .card {
      max-width: 28rem;
      width: 100%;
      background: linear-gradient(165deg, hsl(240 12% 12% / 0.95), hsl(0 0% 6% / 0.9));
      border: 1px solid hsl(0 0% 100% / 0.1);
      border-radius: 20px;
      padding: 2.5rem 2rem 2rem;
      box-shadow: 0 24px 48px hsl(0 0% 0% / 0.5);
      text-align: center;
    }
    .icon {
      width: 76px;
      height: 76px;
      margin: 0 auto 1.25rem;
      border-radius: 20px;
      background: linear-gradient(135deg, hsl(210 20% 35%), hsl(240 12% 22%));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.25rem;
    }
    h1 {
      font-size: 1.45rem;
      font-weight: 800;
      margin: 0 0 0.9rem;
      line-height: 1.5;
    }
    p {
      font-size: 1rem;
      line-height: 1.75;
      color: hsl(330 6% 68%);
      margin: 0 0 1.5rem;
    }
    .sig {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid hsl(0 0% 100% / 0.08);
      font-size: 0.92rem;
      color: hsl(330 8% 52%);
    }
    .sig strong { color: hsl(331 70% 62%); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">👋</div>
    <h1>Extension uninstalled</h1>
    <p>Thanks for using Video DownloadHelper. We hope to see you again when you need easy video downloads.</p>
    <p class="sig">Modified by <strong>Yehia</strong></p>
  </div>
</body>
</html>
